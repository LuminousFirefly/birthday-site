<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday! 🎂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-deep: #1a3a5c;
    --blue-mid: #2e6096;
    --blue-soft: #6a9cbf;
    --blue-pale: #c8dff0;
    --blue-mist: #e8f2f9;
    --cream: #faf6f0;
    --warm-sand: #f0e8d8;
    --terracotta: #c4855a;
    --warm-text: #3a2e22;
    --muted: #7a6e62;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--cream);
    color: var(--warm-text);
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: var(--blue-deep);
    padding: 3rem 1.5rem;
  }

  .hero-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(42,90,140,0.6) 0%, transparent 60%),
      radial-gradient(ellipse 60% 70% at 80% 20%, rgba(100,160,210,0.25) 0%, transparent 55%),
      var(--blue-deep);
  }

  .hero-stars {
    position: absolute; inset: 0; pointer-events: none;
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: rgba(200,220,255,0.7);
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .hero-content {
    position: relative; z-index: 2;
    text-align: center;
    animation: fadeUp 1.2s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-label {
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--blue-pale);
    margin-bottom: 1.2rem;
    opacity: 0.85;
  }

  .hero-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(3.5rem, 10vw, 7rem);
    font-weight: 600;
    color: #ffffff;
    line-height: 1.05;
    margin-bottom: 0.4rem;
    text-shadow: 0 2px 40px rgba(100,160,220,0.4);
  }

  .hero-name em {
    font-style: italic;
    color: var(--blue-pale);
  }

  .hero-sub {
    font-size: 1.1rem;
    color: rgba(200, 220, 240, 0.75);
    margin-top: 1rem;
    font-style: italic;
  }

  .scroll-hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: rgba(200,220,255,0.5);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: fadeUp 1.5s 0.8s ease both;
  }

  .scroll-arrow {
    width: 20px; height: 20px;
    border-right: 1.5px solid rgba(200,220,255,0.4);
    border-bottom: 1.5px solid rgba(200,220,255,0.4);
    transform: rotate(45deg);
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: rotate(45deg) translateY(0); }
    50% { transform: rotate(45deg) translateY(5px); }
  }

  /* ── PHOTOS SECTION ── */
  .section { padding: 5rem 1.5rem; }

  .section-label {
    text-align: center;
    font-size: 0.78rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--blue-soft);
    margin-bottom: 0.75rem;
  }

  .section-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    text-align: center;
    color: var(--blue-deep);
    margin-bottom: 3rem;
    font-weight: 400;
  }

  .section-title em { font-style: italic; color: var(--blue-mid); }

  /* Slideshow */
  .slideshow-wrap {
    max-width: 820px;
    margin: 0 auto;
    position: relative;
  }

  /* .slideshow {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: var(--blue-deep);
    aspect-ratio: 4/3;
    box-shadow: 0 20px 60px rgba(26,58,92,0.2), 0 4px 12px rgba(26,58,92,0.1);
  } */

  .slideshow {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  background: var(--blue-deep);
  height: 600px;
  box-shadow: 0 20px 60px rgba(26,58,92,0.2), 0 4px 12px rgba(26,58,92,0.1);
}

  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.9s ease;
    display: flex; align-items: center; justify-content: center;
  }

  .slide.active { opacity: 1; }

  .slide img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

  /* Placeholder slide when no image */
  .slide-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1rem;
    background: linear-gradient(135deg, var(--blue-deep) 0%, #2a5a8c 100%);
    color: rgba(200,220,255,0.6);
    font-family: 'Playfair Display', serif;
  }

  .slide-placeholder .placeholder-icon {
    font-size: 3rem;
    opacity: 0.4;
  }

  .slide-placeholder p {
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    opacity: 0.5;
  }

  .slide-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 1.5rem 1.5rem 1.2rem;
    background: linear-gradient(to top, rgba(10,25,45,0.75) 0%, transparent 100%);
    color: rgba(240,248,255,0.9);
    font-style: italic;
    font-size: 0.95rem;
  }

  .slideshow-nav {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 100%; display: flex;
    justify-content: space-between;
    padding: 0 1rem;
    pointer-events: none;
    z-index: 5;
  }

  .nav-btn {
    pointer-events: all;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
  }

  .nav-btn:hover { background: rgba(255,255,255,0.28); }

  .slideshow-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 1.2rem;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--blue-pale);
    opacity: 0.35;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
  }

  .dot.active { opacity: 1; transform: scale(1.35); background: var(--blue-mid); }

  /* ── MESSAGES SECTION ── */
  .messages-section {
    background: var(--blue-deep);
    padding: 5rem 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .messages-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--blue-soft), transparent);
  }

  .messages-section .section-label { color: var(--blue-pale); opacity: 0.7; }
  .messages-section .section-title { color: #ffffff; }
  .messages-section .section-title em { color: var(--blue-pale); }

  .messages-grid {
  max-width: 960px;
  margin: 0 auto;
  columns: 3;
  column-gap: 1.5rem;
}

  .message-card {
    break-inside: avoid;
    margin-bottom: 1.5rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(200,220,255,0.12);
    border-radius: 14px;
    padding: 1.6rem 1.4rem;
    transition: transform 0.25s, background 0.25s;
    animation: fadeUp 0.6s ease both;
  }

  .message-card:hover {
    transform: translateY(-4px);
    background: rgba(255,255,255,0.1);
  }

  .message-quote {
    font-size: 2.5rem;
    line-height: 1;
    color: var(--blue-soft);
    opacity: 0.5;
    font-family: 'Playfair Display', serif;
    margin-bottom: 0.6rem;
  }

  .message-text {
    font-size: 0.97rem;
    line-height: 1.75;
    color: rgba(220,235,250,0.88);
    margin-bottom: 1.2rem;
    font-style: italic;
  }

  .message-author {
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--blue-pale);
    opacity: 0.65;
  }

  .message-author::before { content: '— '; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 3.5rem 1.5rem;
    background: var(--cream);
  }

  .footer-heart {
    font-size: 1.8rem;
    margin-bottom: 0.8rem;
    animation: heartbeat 1.5s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.2); }
    30% { transform: scale(1); }
    45% { transform: scale(1.1); }
    60% { transform: scale(1); }
  }

  .footer p {
    font-size: 0.9rem;
    color: var(--muted);
    font-style: italic;
  }

  /* Upload helper section */
  .upload-note {
    max-width: 600px;
    margin: 2rem auto 0;
    padding: 1rem 1.5rem;
    background: var(--warm-sand);
    border-radius: 10px;
    border-left: 3px solid var(--blue-soft);
    font-size: 0.88rem;
    color: var(--muted);
    text-align: center;
  }

  /* responsive */
  @media (max-width: 600px) {
    .messages-grid { columns: 1; }
    .hero-name { font-size: 3rem; }
  }
</style>
</head>
<body>

<!-- ── HERO ── -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-stars" id="starsContainer"></div>

  <div class="hero-content">
    <h1 class="hero-name"><em>HAPPY BIRTHDAY</em></h1>
    <p class="hero-label">KYRA SHIMBO</p>
    <p class="hero-sub">Wishing you the best and happiest day ever :)</p>
  </div>

  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<!-- ── PHOTOS ── -->
<!-- ── PHOTOS ── -->
<section class="section" style="background: var(--cream);">
  <p class="section-label">Memories</p>
  <h2 class="section-title">Through the <em>years</em></h2>

  <div class="slideshow-wrap">
    <div class="slideshow" id="slideshow"></div>

    <div class="slideshow-nav" id="slideshowNav" style="display:none">
      <button class="nav-btn" id="prevBtn" aria-label="Previous photo">&#8249;</button>
      <button class="nav-btn" id="nextBtn" aria-label="Next photo">&#8250;</button>
    </div>
  </div>

  <div class="slideshow-dots" id="dots"></div>
</section>

<!-- ── MESSAGES ── -->
<section class="messages-section">
  <p class="section-label">With love</p>
  <h2 class="section-title" style="margin-bottom: 2.5rem;">Notes from the <em>people who love you</em></h2>
  <div class="messages-grid" id="messagesGrid"></div>
</section>

<!-- ── FOOTER ── -->
<footer class="footer">
  <div class="footer-heart">💙</div>
  <p>Made with love, just for you.</p>
</footer>

<script>
  // Load messages from messages.json
  fetch('messages.json')
  .then(r => r.json())
  .then(messages => {
    const grid = document.getElementById('messagesGrid');
    messages.forEach((msg, i) => {
      const card = document.createElement('div');
      card.className = 'message-card';
      card.style.animationDelay = (i * 0.1) + 's';
      card.innerHTML = `
        <div class="message-quote">"</div>
        <p class="message-text">${msg.text.replace(/\n/g, '<br>')}</p>
        <p class="message-author">${msg.author}</p>
      `;
      grid.appendChild(card);
    });
  });

   // Stars
  const container = document.getElementById('starsContainer');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--d', (2 + Math.random() * 3) + 's');
    s.style.setProperty('--delay', (Math.random() * 4) + 's');
    s.style.opacity = Math.random() * 0.6 + 0.2;
    container.appendChild(s);
  }

 // ── PHOTOS ──────────────────────────────
// Name your photos 1.jpg, 2.jpg, 3.jpg …
// and change this number to match:
const PHOTO_COUNT = 59;
// ────────────────────────────────────────

const slideshowEl = document.getElementById('slideshow');
const dotsContainer = document.getElementById('dots');
const navEl = document.getElementById('slideshowNav');
let slides = [], current = 0, timer;

for (let i = 1; i <= PHOTO_COUNT; i++) {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 1 ? ' active' : '');

  const img = document.createElement('img');
  img.src = `photos/${i}.jpg`;
  img.alt = `Photo ${i}`;
  div.appendChild(img);

  slideshowEl.appendChild(div);
  slides.push(div);

  const d = document.createElement('div');
  d.className = 'dot' + (i === 1 ? ' active' : '');
  d.addEventListener('click', () => goTo(i - 1));
  dotsContainer.appendChild(d);
}

if (slides.length > 1) navEl.style.display = 'flex';

function goTo(n) {
  if (!slides.length) return;
  slides[current].classList.remove('active');
  dotsContainer.children[current] && dotsContainer.children[current].classList.remove('active');
  current = (n + slides.length) % slides.length;
  slides[current].classList.add('active');
  dotsContainer.children[current] && dotsContainer.children[current].classList.add('active');
  resetTimer();
}

function resetTimer() {
  clearInterval(timer);
  if (slides.length > 1) timer = setInterval(() => goTo(current + 1), 4500);
}

document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));

resetTimer();
</script>
</body>
</html>
